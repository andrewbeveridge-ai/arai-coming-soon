<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <title>Another Realm AI International — Coming Soon</title>
  <meta name="description" content="Another Realm AI International — Intelligent Infrastructure. Built to Scale. Infinite Potential.">
  <meta property="og:title" content="Another Realm AI International — Coming Soon">
  <meta property="og:url" content="https://anotherrealmai.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --gold:#D4AF37; --silver:#B8B8B8; --black:#0A0A0A; --white:#FAFAFA; --green:#39FF14; }
    html { height:100%; -webkit-text-size-adjust:100%; }
    body {
      width:100%; height:100%; background:var(--black); color:var(--white); overflow:hidden;
      font-family:'Rajdhani',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }

    /* Canvas is z-index 0 — always behind EVERYTHING */
    #starCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; display:block; }

    /* Scene and all content at z-index 2, above canvas */
    .scene {
      position:relative; z-index:2;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100dvh; min-height:100vh;
      padding:2rem 1.5rem;
      padding-top:max(2rem,env(safe-area-inset-top));
      padding-bottom:max(3rem,env(safe-area-inset-bottom));
    }

    .cs-label {
      font-size:clamp(13px,2.2vw,17px); font-weight:600; letter-spacing:.5em;
      text-transform:uppercase; color:var(--silver); opacity:1;
      margin-bottom:2rem; animation:fadeUp 1s .2s ease both;
    }

    /* ── Orbital ── */
    #orbitalWrap {
      position:relative; width:220px; height:220px;
      flex-shrink:0; margin-bottom:2.2rem;
      animation:fadeUp 1s .4s ease both;
    }
    .ring-mover { position:absolute; top:50%; left:50%; width:0; height:0; }
    .ring { position:absolute; border-radius:50%; border-style:solid; }
    /* ═══ ORBITAL — same SVG geometry, ARAI colors ═══
       Ring 1 gold:   200×80px  rotate(-20)
       Ring 2 silver: 165×66px  rotate( 30)
       Ring 3 green:  124×50px  rotate(-10)  ← both inner rings green per spec
       Ring 4 green:  100×40px  rotate( 15)
       Core: green glow sphere
    ═════════════════════════════════════════════════════ */
    .ring-1 {
      width:200px; height:80px; top:-40px; left:-100px;
      border-width:3.5px; border-color:var(--gold);
      box-shadow:0 0 10px 3px rgba(212,175,55,.6), 0 0 24px 8px rgba(212,175,55,.2);
      transform:rotate(-20deg);
    }
    .ring-2 {
      width:165px; height:66px; top:-33px; left:-82.5px;
      border-width:2.5px; border-color:var(--silver);
      box-shadow:0 0 6px 1px rgba(184,184,184,.4);
      transform:rotate(30deg);
    }
    .ring-3 {
      width:124px; height:50px; top:-25px; left:-62px;
      border-width:2px; border-color:var(--green);
      box-shadow:0 0 8px 2px rgba(57,255,20,.5);
      transform:rotate(-10deg);
    }
    .ring-4 {
      width:100px; height:40px; top:-20px; left:-50px;
      border-width:1.8px; border-color:var(--green);
      box-shadow:0 0 6px 1px rgba(57,255,20,.38);
      transform:rotate(15deg);
    }
    .core-sphere {
      position:absolute; top:50%; left:50%;
      width:45px; height:45px; margin:-22.5px 0 0 -22.5px; border-radius:50%;
      background:radial-gradient(circle at 32% 28%,
        rgba(57,255,20,.95) 0%, rgba(57,255,20,.48) 42%, rgba(57,255,20,.05) 100%);
      box-shadow:0 0 18px 6px rgba(57,255,20,.55), 0 0 50px 20px rgba(57,255,20,.18);
      transition:box-shadow .7s ease; z-index:10;
    }
    .core-sphere.brightened {
      box-shadow:0 0 28px 12px rgba(57,255,20,.9), 0 0 80px 35px rgba(57,255,20,.4);
    }

    /* Text: ANOTHER REALM large gold, AI INTERNATIONAL smaller silver */
    .brand-another {
      font-size:clamp(2.2rem,5.5vw,3.8rem); font-weight:700; letter-spacing:.22em; text-transform:uppercase;
      background:linear-gradient(135deg,var(--gold) 0%,#f5dc6e 35%,var(--gold) 55%,#9a7018 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      background-size:250% 250%; line-height:1; margin-bottom:.3rem;
      animation:fadeUp 1s .6s ease both, shimmer 4s 1.5s linear infinite;
    }
    .brand-dba {
      font-size:clamp(1.1rem,2.8vw,1.6rem); font-weight:600; letter-spacing:.35em; text-transform:uppercase;
      background:linear-gradient(135deg,var(--white) 0%,var(--silver) 35%,var(--white) 55%,#888 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      background-size:250% 250%; line-height:1; margin-bottom:1.4rem;
      animation:fadeUp 1s .7s ease both, shimmer 5s 2s linear infinite;
    }
    .gold-rule {
      width:180px; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      margin-bottom:1.2rem; animation:fadeUp 1s .9s ease both;
    }
    .pillars {
      font-family:'Cormorant Garamond',Georgia,serif; font-weight:700;
      font-size:clamp(.78rem,2vw,1rem); letter-spacing:.15em; text-transform:uppercase;
      background:linear-gradient(135deg,var(--gold) 0%,#f5dc6e 35%,var(--gold) 60%,#c09020 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      background-size:250% 250%; margin-bottom:2rem; text-align:center;
      animation:fadeUp 1s 1s ease both, shimmer 6s 2.5s linear infinite;
      line-height:2;
    }
    @media(max-width:500px){
      .pillars { font-size:clamp(.72rem,3.5vw,.88rem); line-height:2.2; }
    }

    /* Activate warp button */
    .activate-wrap { margin-bottom:1.6rem; position:relative; animation:fadeUp 1s 1.1s ease both; }
    .activate-btn {
      min-height:44px; padding:.65rem 2.4rem; background:transparent;
      border:1px solid rgba(57,255,20,.45); color:var(--green);
      font-family:'Rajdhani',sans-serif; font-size:.75rem; font-weight:600;
      letter-spacing:.28em; text-transform:uppercase; cursor:pointer; border-radius:2px;
      transition:border-color .2s,box-shadow .2s,background .2s; -webkit-tap-highlight-color:transparent;
    }
    .activate-btn:hover { border-color:var(--green); box-shadow:0 0 16px rgba(57,255,20,.35); }
    .activate-btn.warping {
      border-color:var(--green); background:rgba(57,255,20,.06);
      box-shadow:0 0 24px rgba(57,255,20,.7),0 0 60px rgba(57,255,20,.2);
    }
    .ripple {
      position:absolute; top:50%; left:50%; width:14px; height:14px; margin:-7px 0 0 -7px;
      border-radius:50%; border:1.5px solid var(--green); pointer-events:none; opacity:0;
    }
    .ripple.active { animation:rippleOut 1s ease-out forwards; }
    @keyframes rippleOut { 0%{transform:scale(1);opacity:.8;} 100%{transform:scale(32);opacity:0;} }

    /* Form */
    .form-wrap { width:100%; max-width:420px; animation:fadeUp 1s 1.2s ease both; }
    .form-label {
      display:block; text-align:center;
      font-size:clamp(.75rem,1.8vw,.9rem); letter-spacing:.22em; text-transform:uppercase;
      color:var(--silver); opacity:.88; margin-bottom:.75rem;
    }
    .input-row {
      display:flex; border-radius:3px; border:1px solid rgba(212,175,55,.4);
      overflow:hidden; background:rgba(255,255,255,.025); transition:border-color .2s,box-shadow .2s;
    }
    .input-row:focus-within { border-color:rgba(212,175,55,.85); box-shadow:0 0 0 3px rgba(212,175,55,.12); }
    .input-row input[type="email"] {
      flex:1; min-height:48px; padding:.85rem 1.1rem;
      background:transparent; border:none; outline:none; color:var(--white);
      font-family:'Rajdhani',sans-serif; font-size:1rem;
    }
    .input-row input::placeholder { color:rgba(250,250,250,.3); }
    .input-row button {
      min-height:48px; padding:.85rem 1.4rem; background:transparent;
      border:none; border-left:1px solid rgba(212,175,55,.4); color:var(--gold); cursor:pointer;
      font-family:'Rajdhani',sans-serif; font-size:.78rem; font-weight:700;
      letter-spacing:.16em; text-transform:uppercase;
      transition:background .2s,color .2s,box-shadow .2s; -webkit-tap-highlight-color:transparent;
    }
    .input-row button:hover { background:var(--gold); color:var(--black); box-shadow:0 0 18px 4px rgba(212,175,55,.5); }
    .success-msg {
      display:none; text-align:center; padding:.9rem;
      font-family:'Cormorant Garamond',Georgia,serif; font-style:italic;
      color:var(--gold); font-size:1.05rem; letter-spacing:.08em;
    }
    .error-msg { display:none; text-align:center; padding:.45rem; color:#ff7070; font-size:.82rem; }
    .privacy-note {
      margin-top:.7rem; text-align:center;
      font-size:clamp(.75rem,1.8vw,.85rem); color:rgba(250,250,250,.62);
      letter-spacing:.06em; font-family:'DM Mono','Courier New',monospace;
    }
    .contact-email {
      margin-top:1.2rem; font-family:'DM Mono','Courier New',monospace;
      font-size:clamp(.82rem,2vw,1rem); color:var(--silver); opacity:.8;
      letter-spacing:.08em; animation:fadeUp 1s 1.3s ease both;
    }
    .site-footer {
      position:fixed; bottom:0; left:0; right:0;
      padding:.6rem 1rem max(.9rem,env(safe-area-inset-bottom));
      text-align:center; font-size:.6rem; letter-spacing:.16em; text-transform:uppercase;
      color:rgba(250,250,250,.18); font-family:'Rajdhani',sans-serif;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
    @keyframes shimmer { 0%{background-position:250% center;} 100%{background-position:-250% center;} }
    /* Short screens (landscape mobile etc) */
    @media(max-height:720px){
      .cs-label{margin-bottom:1rem;}
      #orbitalWrap{width:170px;height:170px;margin-bottom:1.2rem;}
      .ring-1{width:155px;height:62px;top:-31px;left:-77.5px;}
      .ring-2{width:128px;height:51px;top:-25.5px;left:-64px;}
      .ring-3{width:96px; height:39px;top:-19.5px;left:-48px;}
      .ring-4{width:77px; height:31px;top:-15.5px;left:-38.5px;}
      .core-sphere{width:35px;height:35px;margin:-17.5px 0 0 -17.5px;}
      .brand-another{font-size:clamp(1.8rem,4.5vw,2.8rem);}
      .activate-wrap{margin-bottom:1rem;}
    }
    /* Narrow screens (mobile phones — Samsung Galaxy, iPhone etc) */
    @media(max-width:500px){
      #orbitalWrap{width:170px;height:170px;margin-bottom:1.4rem;}
      .ring-1{width:155px;height:62px;top:-31px;left:-77.5px;}
      .ring-2{width:128px;height:51px;top:-25.5px;left:-64px;}
      .ring-3{width:96px; height:39px;top:-19.5px;left:-48px;}
      .ring-4{width:77px; height:31px;top:-15.5px;left:-38.5px;}
      .core-sphere{width:35px;height:35px;margin:-17.5px 0 0 -17.5px;}
      .brand-another{font-size:clamp(1.8rem,5vw,2.6rem);}
      .pillars{font-size:clamp(.72rem,3.5vw,.88rem);}
      .form-wrap{max-width:100%;}
      /* Stack pillars vertically on narrow screens */
      .pillar-sep{ display:none; }
      .pillar-line{ display:block; line-height:2; }
    }
  </style>
</head>
<body>

<!-- z-index 0: always behind scene -->
<canvas id="starCanvas"></canvas>

<form name="arai-waitlist" method="POST" data-netlify="true"
      netlify-honeypot="bot-field" id="netlifyForm" style="display:none">
  <input type="hidden" name="venture" value="Another Realm AI International">
  <input type="hidden" name="bot-field"><input type="email" name="email">
</form>

<!-- z-index 2: all content above star field -->
<main class="scene">
  <p class="cs-label">Coming Soon</p>

  <div id="orbitalWrap">
    <div class="ring-mover" id="m1"><div class="ring ring-1" id="ring1"></div></div>
    <div class="ring-mover" id="m2"><div class="ring ring-2" id="ring2"></div></div>
    <div class="ring-mover" id="m3"><div class="ring ring-3" id="ring3"></div></div>
    <div class="ring-mover" id="m4"><div class="ring ring-4" id="ring4"></div></div>
    <div class="core-sphere" id="coreSphere"></div>
  </div>

  <p class="brand-another">Another Realm</p>
  <p class="brand-dba">AI International</p>
  <div class="gold-rule"></div>
  <p class="pillars">Intelligent Infrastructure &nbsp;◆&nbsp; Built to Scale &nbsp;◆&nbsp; Infinite Potential</p>

  <div class="activate-wrap">
    <button class="activate-btn" id="activateBtn" onclick="activateWarp()">Enter The Realm</button>
    <div class="ripple" id="ripple1"></div>
    <div class="ripple" id="ripple2"></div>
    <div class="ripple" id="ripple3"></div>
  </div>

  <div class="form-wrap">
    <label class="form-label">Get Early Access</label>
    <div class="input-row" id="inputRow">
      <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email" inputmode="email">
      <button onclick="submitEmail()">Notify Me</button>
    </div>
    <div class="success-msg" id="successMsg">&#10022;&nbsp; You're on the list. We'll be in touch.</div>
    <div class="error-msg" id="errorMsg"></div>
    <p class="privacy-note">No spam &nbsp;·&nbsp; Unsubscribe anytime</p>
  </div>
  <p class="contact-email">info@anotherrealmai.com</p>
</main>

<footer class="site-footer">&copy; 2026 Another Realm AI International, Inc. &nbsp;|&nbsp; anotherrealmai.com</footer>

<script>
/* ════════════════════════════════════════
   STAR FIELD — atmospheric warp, NOT sparkler
   Key fixes vs v2:
   - Streaks max opacity 0.38 (was 0.9) — atmospheric, not explosive
   - Streak length ×7 (was ×18) — subtle depth, not fireworks  
   - Trail fade 0.1+0.06 (was 0.15+0.12) — less persistence
   - Slight blue-white tint — space feel not flashlight
   - Canvas stays z-index 0 always — text/icon always above
════════════════════════════════════════ */
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let S = [];
let warpActive = false;
let warpIntensity = 0;

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }

function initStars() {
  S = [];
  for (let i = 0; i < 240; i++) {
    S.push({
      x:   Math.random() * canvas.width,
      y:   Math.random() * canvas.height,
      r:   Math.random() * 1.5 + 0.2,
      b:   Math.random() * 0.5 + 0.12,
      ph:  Math.random() * Math.PI * 2,
      sp:  0.08 + Math.random() * 0.22,
      vx:  0, vy: 0,
    });
  }
}

function resetStarWarp(s) {
  const angle = Math.random() * Math.PI * 2;
  const dist  = Math.random() * 35;
  s.x = canvas.width  / 2 + Math.cos(angle) * dist;
  s.y = canvas.height / 2 + Math.sin(angle) * dist;
  const spd = 0.8 + Math.random() * 2;
  s.vx = Math.cos(angle) * spd;
  s.vy = Math.sin(angle) * spd;
  s.r  = Math.random() * 1.6 + 0.3;
}

function draw(t) {
  if (warpActive) {
    warpIntensity = Math.min(1, warpIntensity + 0.008);
    // Subtle trail — key to "depth" feel vs "sparkler"
    ctx.fillStyle = `rgba(10,10,10,${0.10 + warpIntensity * 0.06})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    if (warpIntensity > 0) {
      warpIntensity = Math.max(0, warpIntensity - 0.012);
      ctx.fillStyle = `rgba(10,10,10,${0.10 + warpIntensity * 0.06})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  S.forEach(s => {
    if (warpActive || warpIntensity > 0) {
      const spd = 1 + warpIntensity * 3;  // max ×4 — smooth deep-space feel
      s.x += s.vx * spd;
      s.y += s.vy * spd;

      const vel = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
      const streakLen = warpIntensity * 5 * vel;  // proportional to reduced speed

      if (streakLen > 2) {
        ctx.beginPath();
        ctx.moveTo(s.x - s.vx * streakLen, s.y - s.vy * streakLen);
        ctx.lineTo(s.x, s.y);
        // Blue-white tint for space atmosphere
        const alpha = 0.12 + warpIntensity * 0.26;  // max 0.38 (was 0.9)
        ctx.strokeStyle = `rgba(210,225,255,${alpha})`;
        ctx.lineWidth = s.r * 0.7;
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, 6.283);
        ctx.fillStyle = `rgba(220,232,255,${0.3 + warpIntensity * 0.35})`;
        ctx.fill();
      }

      if (s.x < -20 || s.x > canvas.width + 20 || s.y < -20 || s.y > canvas.height + 20) {
        resetStarWarp(s);
      }
    } else {
      // Normal twinkle — warm white
      const a = s.b + (1 - s.b) * 0.5 * (1 + Math.sin(s.ph + t * s.sp * 0.0005));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, 6.283);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    }
    s.ph += 0.004;
  });

  requestAnimationFrame(draw);
}

resize(); initStars(); requestAnimationFrame(draw);
window.addEventListener('resize', () => { resize(); if (!warpActive) initStars(); });

/* ── Activate Warp ── */
function activateWarp() {
  if (warpActive) return;
  warpActive = true;

  // Radial outward velocity from current positions
  S.forEach(s => {
    const dx = s.x - canvas.width  / 2;
    const dy = s.y - canvas.height / 2;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const spd  = 0.5 + Math.random() * 1.8;
    s.vx = (dx / dist) * spd;
    s.vy = (dy / dist) * spd;
  });

  ['ripple1','ripple2','ripple3'].forEach((id,i) =>
    setTimeout(() => { const r=document.getElementById(id); r.classList.remove('active'); void r.offsetWidth; r.classList.add('active'); }, i*200)
  );

  const btn = document.getElementById('activateBtn');
  btn.disabled = true;
  btn.classList.add('warping');
  btn.textContent = 'Entering... ✦';
  document.getElementById('coreSphere').classList.add('brightened');

  // Auto-reset after 7 seconds
  setTimeout(() => {
    warpActive = false;
    document.getElementById('coreSphere').classList.remove('brightened');
    // Let intensity wind down naturally, then reinit stars and reset button
    setTimeout(() => {
      initStars(); // Fresh clean star field
      btn.textContent = 'Enter The Realm';
      btn.classList.remove('warping');
      btn.disabled = false;
    }, 2800); // 2.8s for intensity to wind back to 0
  }, 7000);
}

/* ── Orbital — mover-based (same as Productions) ── */
const movers = ['m1','m2','m3','m4'].map(id => document.getElementById(id));
const coreEl = document.getElementById('coreSphere');
// Orbit paths — constrained to stay on screen and above title text
const PATHS = [
  [{tx:'0px',ty:'0px'},
   {tx:'calc(40vw - 110px)',ty:'calc(-22vh + 36px)'},
   {tx:'calc(40vw - 110px)',ty:'calc(22vh - 36px)'},
   {tx:'calc(-40vw + 110px)',ty:'calc(22vh - 36px)'},
   {tx:'calc(-40vw + 110px)',ty:'calc(-22vh + 36px)'}],
  [{tx:'0px',ty:'0px'},
   {tx:'calc(-38vw + 95px)',ty:'calc(-20vh + 32px)'},
   {tx:'calc(-38vw + 95px)',ty:'calc(20vh - 32px)'},
   {tx:'calc(38vw - 95px)',ty:'calc(20vh - 32px)'},
   {tx:'calc(38vw - 95px)',ty:'calc(-20vh + 32px)'}],
  [{tx:'0px',ty:'0px'},
   {tx:'0px',ty:'calc(-20vh + 28px)'},
   {tx:'calc(35vw - 70px)',ty:'0px'},
   {tx:'0px',ty:'calc(18vh - 28px)'},
   {tx:'calc(-35vw + 70px)',ty:'0px'}],
  [{tx:'0px',ty:'0px'},
   {tx:'0px',ty:'calc(16vh - 23px)'},
   {tx:'calc(-32vw + 60px)',ty:'0px'},
   {tx:'0px',ty:'calc(-18vh + 23px)'},
   {tx:'calc(32vw - 60px)',ty:'0px'}],
];
const ks = document.createElement('style'); document.head.appendChild(ks);
function iKF(n,p){const f=p.map((pt,i)=>`${[0,25,50,75,100][i]}%{transform:translate(${pt.tx},${pt.ty});opacity:${i===0?1:0.45};}`).join(' ');try{ks.sheet.insertRule(`@keyframes ${n}{${f}}`,ks.sheet.cssRules.length);}catch(e){}}
function iRK(n,e){try{ks.sheet.insertRule(`@keyframes ${n}{0%{transform:translate(${e.tx},${e.ty});opacity:0.45;}100%{transform:translate(0px,0px);opacity:1;}}`,ks.sheet.cssRules.length);}catch(e){}}
PATHS.forEach((p,i)=>{iKF(`orbit${i+1}`,p);iRK(`ret${i+1}`,p[4]);});
let cyc=false;
function cycle(){
  if(cyc)return;cyc=true;
  setTimeout(()=>movers.forEach((m,i)=>{m.style.transition='none';m.style.animation=`orbit${i+1} 8s linear forwards`;}),5000);
  const rb=13000;
  [3,2,1,0].forEach((mi,step)=>setTimeout(()=>{
    movers[mi].style.animation=`ret${mi+1} 1800ms cubic-bezier(0.25,0.1,0.25,1) forwards`;
    if(mi===2)coreEl.classList.add('brightened');
  },rb+step*600));
  setTimeout(()=>{
    movers.forEach(m=>{m.style.animation='none';m.style.transition='opacity .5s';m.style.opacity='1';m.style.transform='translate(0px,0px)';});
    coreEl.classList.remove('brightened');cyc=false;setTimeout(cycle,5000);
  },rb+3*600+2000+200);
}
// Disable orbit on mobile — rings look wrong traveling off small screens
if(window.innerWidth > 600) setTimeout(cycle,1200);

/* ── Email ── */
const SU='https://script.google.com/macros/s/AKfycbzGTrqyVhM4JcfSqnwEETPmZLImeoGOCOeP7tVpoivEDNUqdirVCJONGAWlBQLNPk7_AA/exec';
async function submitEmail(){
  const inp=document.getElementById('emailInput'),btn=inp.nextElementSibling,email=inp.value.trim();
  if(!email||!email.includes('@')||!email.includes('.')){showErr('Please enter a valid email.');return;}
  const orig=btn.textContent;btn.textContent='...';btn.disabled=true;let ok=false;
  if(SU){try{const r=await fetch(SU,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({secret:'Realmauto2026!',action:'email_signup',email,venture:'Another Realm AI International',source:location.hostname})});if((await r.json()).status==='success')ok=true;}catch(_){}}
  if(!ok){try{const fd=new FormData();fd.append('form-name','arai-waitlist');fd.append('venture','Another Realm AI International');fd.append('email',email);const r=await fetch('/',{method:'POST',body:fd});if(r.ok)ok=true;}catch(_){ok=true;}}
  if(ok){document.getElementById('inputRow').style.display='none';document.getElementById('successMsg').style.display='block';}
  else{btn.textContent=orig;btn.disabled=false;showErr('Something went wrong. Try again.');}
}
function showErr(m){const e=document.getElementById('errorMsg');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitEmail();});
</script>
